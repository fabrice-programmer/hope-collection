{% extends "base.html" %}

{% block title %}
Market Page
{% endblock %}

{% block content %}

<div class="container mt-4">
    <h2 class="text-center mb-4">Market Items</h2>

    <table class="table table-striped table-hover shadow">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Barcode</th>
                <th>Price ($)</th>
                <th>Description</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.id }}</td>
                <td>{{ item.name }}</td>
                <td>{{ item.barcode }}</td>
                <td>{{ item.price }}</td>
                <td>{{ item.description }}</td>
                <td>
                    <button class="btn btn-info btn-sm">More Info</button>
                    <button class="btn btn-success btn-sm">Buy</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
