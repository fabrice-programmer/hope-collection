{% extends "base.html" %}

{% block title %}
Market Page
{% endblock %}

{% block content %}

<h1>Market Page</h1>

<table class="table table-striped table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Barcode</th>
            <th>Price ($)</th>
        </tr>
    </thead>
    <tbody>
        {% for item in items %}
        <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.name }}</td>
            <td>{{ item.barcode }}</td>
            <td>{{ item.price }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="/add" class="btn btn-success">Add Item</a>

{% endblock %}
