{% extends "base.html" %}

{% block title %}
Market Page
{% endblock %}

{% block content %}

<h1>Market Page</h1>

<table class="table table-striped table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Barcode</th>
            <th>Price ($)</th>
            <th>Option</th>
        </tr>
    </thead>

    <tbody>
        {% for item in items %}
        <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.name }}</td>
            <td>{{ item.barcode }}</td>
            <td>{{ item.price }}$</td>
            <td>
                <button class="btn btn-outline-info">More Info</button>
                <button class="btn btn-outline-success">Purchase Item</button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
